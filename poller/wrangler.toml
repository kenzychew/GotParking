# GotParking poller (design doc T3): cron cycle fetching LTA DataMall carpark
# availability into Supabase, with healthchecks.io pings and the batch-predict
# trigger. See poller/README.md for the full behavior contract.

name = "gotparking-poller"
main = "src/index.ts"
compatibility_date = "2026-06-01"

# Poll every 5 minutes (Premise #9; 288 LTA calls/day vs the 10M/day ceiling).
[triggers]
crons = ["*/5 * * * *"]

# Persist worker logs so the "poller silent" runbook has something to read.
[observability]
enabled = true

# ---------------------------------------------------------------------------
# Runtime bindings -- all six are Workers SECRETS (never [vars], never
# committed). Set each with: wrangler secret put <NAME>
#
#   LTA_API_KEY                  LTA DataMall AccountKey
#   SUPABASE_URL                 https://<project-ref>.supabase.co
#   SUPABASE_SERVICE_ROLE_KEY    Supabase service-role key (bypasses RLS;
#                                poller/training/batch-predict only)
#   BATCH_SHARED_SECRET          value sent as the x-batch-secret header when
#                                triggering the batch-predict endpoint
#   HEALTHCHECKS_POLLER_PING_URL healthchecks.io ping URL for the poller check
#   BATCH_PREDICT_URL            Vercel batch-predict endpoint URL
#
# BATCH_PREDICT_URL and BATCH_SHARED_SECRET exist only after Lane D deploys;
# HEALTHCHECKS_POLLER_PING_URL exists once the T1.5 check is created. The
# worker logs and skips the corresponding step while any of them is unset.
# For local `wrangler dev`, put the same names in poller/.dev.vars
# (gitignored at the repo root).
# ---------------------------------------------------------------------------
