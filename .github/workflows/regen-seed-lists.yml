name: Regenerate seed carpark lists

# Manual only -- there's no recurring auto-discovery pipeline yet (deferred; see the
# coverage-expansion plan's "Deferred to TODOS.md" section). Run this after a human has
# produced/updated data/carpark_coverage_map.json (Phase A's whitelist-matching script,
# a separate tool) and wants to fold newly-"verified" candidates into the two hardcoded
# seed-list files without hand-editing them.
on:
  workflow_dispatch:
    inputs:
      coverage_map_path:
        description: "Path to the coverage-map JSON (relative to repo root)"
        required: false
        default: "data/carpark_coverage_map.json"

jobs:
  regen:
    name: Regenerate carparks.ts + seedCarparks.ts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "scripts/uv.lock"

      - name: Set up Python
        run: uv python install
        working-directory: scripts

      - name: Sync dependencies
        run: uv sync --locked
        working-directory: scripts

      - name: Run the seed-list regenerator
        run: uv run python regen_seed_lists.py "../${{ github.event.inputs.coverage_map_path }}"
        working-directory: scripts

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- poller/src/carparks.ts frontend/src/seed/seedCarparks.ts; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # TODO: this step is the one part of this workflow we're NOT fully confident in --
      # verify before relying on it in CI:
      #   1. Whether the default GITHUB_TOKEN has permission to open a PR in this repo, or
      #      whether "Allow GitHub Actions to create and approve pull requests" needs to be
      #      enabled in repo Settings > Actions > General first (it's off by default on new
      #      repos, and peter-evans/create-pull-request silently fails to open a PR --
      #      though the commit/branch push itself succeeds -- without it).
      #   2. Whether `permissions: contents: write, pull-requests: write` needs to be added
      #      at the workflow or job level (also currently unset above).
      #   3. The exact reviewer/label/commit-signing conventions this repo wants for a
      #      generated-file PR, if any.
      # Left as peter-evans/create-pull-request@v6 (the standard action for this) with a
      # conservative default config -- confirm the above against a real run before treating
      # this workflow as load-bearing.
      - name: Open a PR with the regenerated files
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(seed-lists): regenerate from coverage map"
          title: "chore(seed-lists): regenerate carparks.ts + seedCarparks.ts"
          body: >
            Auto-generated by .github/workflows/regen-seed-lists.yml from
            ${{ github.event.inputs.coverage_map_path }}. Review the diff against the source
            coverage-map JSON before merging -- this PR only regenerates the two static seed
            lists; it does not deploy the poller or frontend.
          branch: chore/regen-seed-lists
          add-paths: |
            poller/src/carparks.ts
            frontend/src/seed/seedCarparks.ts

      - name: No changes
        if: steps.diff.outputs.changed == 'false'
        run: echo "Regenerated files are identical to what's already committed -- nothing to PR."
