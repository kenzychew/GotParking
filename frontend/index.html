<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0969da" />
    <meta
      name="description"
      content="GotParking: carpark availability forecasts for 10 Singapore malls, 20 minutes ahead."
    />
    <link rel="icon" type="image/png" href="/icons/pwa-192.png" />
    <link rel="apple-touch-icon" href="/icons/pwa-192.png" />
    <title>GotParking</title>
    <script>
      // Resolve the theme before first paint to avoid a flash of the wrong
      // theme. Mirrors the logic in src/lib/theme.ts (kept in sync there);
      // this inline copy only needs to run once, synchronously, pre-React.
      (function () {
        try {
          var stored = localStorage.getItem("gotparking:theme-v1");
          var theme =
            stored === "light" || stored === "dark"
              ? stored
              : window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          document.documentElement.setAttribute("data-theme", theme);
        } catch (err) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
